{% extends './layout/base.html'%} {% block content %}
<header
  class="mt-0 ms-4 me-4 d-flex justify-content-between align-items-center"
>
  <h4>HotelesKevin</h4>
  <ul
    class="list-unstyled d-flex justify-content-between align-items-center w-25 mt-3 fs-5"
  >
    <li><a href="#" class="text-decoration-none text-light">Soporte</a></li>
    <li>
      <a href="{% url 'pricing_page'%}" class="text-decoration-none text-light"
        >Precios</a
      >
    </li>
    <li>
      <a href="{% url 'landing_page'%}" class="text-decoration-none text-light"
        >Acerca de</a
      >
    </li>
    <a href="#" onclick="login" id="logout-btn" class="btn btn-light"
      >Logout <i class="bi bi-person-circle"></i
    ></a>
  </ul>
</header>

<form
  style="display: none"
  method="post"
  id="logout-form"
  action="{% url 'logout' %}"
>
  {% csrf_token %}
</form>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const logoutBtn = document.getElementById("logout-btn");

  logoutBtn.addEventListener("click", () => {
    Swal.fire({
      title: "¿Estas seguro de cerrar sesion?",
      text: "se cerrara la sesion",
      icon: "warning",
      showCancelButton: true,
      confirmButtonText: "Aceptar",
      cancelButtonText: "cancelar",
      reverseButtons: true,
    }).then((result) => {
      if (result.isConfirmed) {
        document.getElementById("logout-form").submit();
      }
    });
  });
</script>
{% endblock content%}
